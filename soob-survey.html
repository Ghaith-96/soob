<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>صوب — سجّل معلوماتك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --sunset:#ff7a3d;--deep:#5b3fa6;--gold:#e0a458;
  --black:#191919;--white:#fcf7f1;--paper:#e7ddd1;
  --border:2px solid #191919;
  --shadow:5px 5px 0 #191919;
  --shadow-lg:7px 7px 0 #191919;
  --shadow-sm:3px 3px 0 #191919;
}
body{
  font-family:'Cairo',sans-serif;
  background:#f5f3ee;
  background-image:
    linear-gradient(rgba(180,170,158,.35) 1px,transparent 1px),
    linear-gradient(90deg,rgba(180,170,158,.35) 1px,transparent 1px);
  background-size:32px 32px;
  min-height:100vh;color:var(--black);
}

/* HEADER */
header{
  border-bottom:var(--border);background:#f5f3ef;
  padding:14px 40px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
}
.logo{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1}
.logo .dot{color:var(--sunset)}
.tagline{font-size:12px;color:var(--deep);font-weight:700;margin-top:3px}
.header-link{
  font-size:13px;color:#fff;text-decoration:none;font-weight:800;
  border:var(--border);padding:8px 20px;border-radius:999px;
  background:var(--black);box-shadow:var(--shadow-sm);
  transition:transform .1s,box-shadow .1s;
}
.header-link:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow)}

/* SURVEY WRAPPER */
.survey-wrap{
  max-width:600px;margin:0 auto;padding:64px 28px 96px;
}

/* PROGRESS */
.progress-row{display:flex;align-items:center;gap:14px;margin-bottom:48px}
.progress-bar{flex:1;background:var(--paper);border-radius:999px;height:8px;border:var(--border);overflow:hidden}
.progress-fill{height:100%;background:var(--sunset);border-radius:999px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.progress-label{font-size:13px;font-weight:800;color:#aaa;white-space:nowrap}

/* STEP CARD */
.step-card{
  border:var(--border);box-shadow:var(--shadow-lg);border-radius:20px;
  background:#fff;padding:40px 36px;
  animation:slideIn .25s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.step-pill{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:800;letter-spacing:.4px;
  padding:6px 16px;border-radius:999px;border:var(--border);
  box-shadow:var(--shadow-sm);margin-bottom:18px;
  background:var(--paper);
}
.step-title{font-size:32px;font-weight:900;margin-bottom:28px;letter-spacing:-.5px;line-height:1.2}

/* INPUTS */
.survey-input{
  width:100%;border:var(--border);padding:14px 18px;border-radius:14px;
  font-family:'Cairo',sans-serif;font-size:16px;background:#fff;
  margin-bottom:24px;transition:box-shadow .1s;
}
.survey-input:focus{outline:none;box-shadow:var(--shadow-sm)}

/* CHOICE GRID */
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.choice-btn{
  border:var(--border);padding:18px 14px;text-align:center;border-radius:16px;
  cursor:pointer;background:#fff;font-family:'Cairo',sans-serif;
  font-size:15px;font-weight:700;transition:all .12s;
}
.choice-btn:hover{background:var(--paper);transform:translate(-2px,-2px);box-shadow:var(--shadow-sm)}
.choice-btn.active{background:var(--deep);color:#fff;box-shadow:var(--shadow);transform:translate(-2px,-2px)}

/* PILLS MULTI */
.pill-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px}
.pill-btn{
  border:var(--border);padding:10px 20px;border-radius:999px;
  cursor:pointer;background:#fff;font-family:'Cairo',sans-serif;
  font-size:14px;font-weight:700;transition:all .12s;
}
.pill-btn:hover{background:var(--paper);transform:translate(-1px,-1px);box-shadow:var(--shadow-sm)}
.pill-btn.active{background:var(--sunset);color:#fff;box-shadow:var(--shadow-sm);transform:translate(-1px,-1px)}

/* RESTAURANT GRID */
.rest-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.rest-btn{
  border:var(--border);padding:16px;text-align:center;border-radius:16px;
  cursor:pointer;background:#fff;font-family:'Cairo',sans-serif;
  font-size:14px;font-weight:800;transition:all .12s;
}
.rest-btn:hover{background:var(--paper);transform:translate(-2px,-2px);box-shadow:var(--shadow-sm)}
.rest-btn.active{background:var(--gold);color:var(--black);box-shadow:var(--shadow);transform:translate(-2px,-2px);border-color:var(--black)}

/* BUTTONS */
.btn-next{
  width:100%;background:var(--sunset);color:#fff;
  border:var(--border);box-shadow:var(--shadow);border-radius:999px;
  padding:18px;font-family:'Cairo',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;transition:transform .12s,box-shadow .12s;margin-bottom:12px;
}
.btn-next:hover{transform:translate(-3px,-3px);box-shadow:var(--shadow-lg)}
.btn-next:active{transform:translate(2px,2px);box-shadow:none}
.btn-prev{
  width:100%;background:transparent;border:var(--border);padding:14px;
  border-radius:999px;font-family:'Cairo',sans-serif;font-size:14px;
  font-weight:700;cursor:pointer;transition:all .1s;
}
.btn-prev:hover{background:var(--paper)}

/* ERROR */
.err-msg{font-size:13px;color:#b91c1c;font-weight:700;margin-bottom:14px;display:none}

/* DONE CARD */
.done-card{
  border:var(--border);box-shadow:var(--shadow-lg);border-radius:20px;
  background:var(--deep);color:#fff;padding:56px 36px;text-align:center;
  position:relative;overflow:hidden;
}
.done-card::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);
  background-size:28px 28px;
}
.done-card>*{position:relative}
.done-rest{
  display:inline-block;background:var(--gold);color:var(--black);
  border:var(--border);border-radius:999px;padding:8px 20px;
  font-size:14px;font-weight:800;margin:4px;box-shadow:var(--shadow-sm);
}

@media(max-width:600px){
  .choice-grid{grid-template-columns:1fr}
  .rest-grid{grid-template-columns:1fr}
  .step-title{font-size:26px}
  .step-card{padding:28px 22px}
  header{padding:12px 20px}
  .survey-wrap{padding:40px 16px 72px}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">صـ<span class="dot">وب</span></div>
    <div class="tagline">صوّبنا لك</div>
  </div>
  <a href="soob-home.html" class="header-link">← رجوع</a>
</header>

<div class="survey-wrap">
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:11%"></div></div>
    <div class="progress-label" id="progressLabel">1 / 9</div>
  </div>
  <div id="stepContainer"></div>
</div>

<script>
const sv = {restaurants:[], hobbies:[]};
let currentStep = 1;
const TOTAL = 9;

const STEPS = [
  {
    n:1, pill:'👋 تعرّف علينا', title:'وش اسمك؟',
    render:()=>`
      <input type="text" class="survey-input" id="sv_name" placeholder="اسمك الأول" value="${sv.name||''}">
      <button class="btn-next" onclick="svNext(1)">التالي ←</button>
    `
  },
  {
    n:2, pill:'👤 الجنس', title:'وش جنسك؟',
    render:()=>`
      <div class="choice-grid">
        <button class="choice-btn${sv.gender==='ذكر'?' active':''}" onclick="svPick('gender','ذكر',this)">👨 ذكر</button>
        <button class="choice-btn${sv.gender==='أنثى'?' active':''}" onclick="svPick('gender','أنثى',this)">👩 أنثى</button>
      </div>
      <button class="btn-next" onclick="svNext(2)">التالي ←</button>
      <button class="btn-prev" onclick="goStep(1)">← رجوع</button>
    `
  },
  {
    n:3, pill:'🎂 العمر', title:'الفئة العمرية؟',
    render:()=>`
      <div class="choice-grid">
        ${['18-24','25-34','35-44','45+'].map(a=>`
          <button class="choice-btn${sv.age===a?' active':''}" onclick="svPick('age','${a}',this)">${a}</button>
        `).join('')}
      </div>
      <button class="btn-next" onclick="svNext(3)">التالي ←</button>
      <button class="btn-prev" onclick="goStep(2)">← رجوع</button>
    `
  },
  {
    n:4, pill:'💬 رأيك', title:'وش رأيك بصوب؟',
    render:()=>`
      <div class="choice-grid">
        ${['ممتاز 🔥','زين 👍','عادي 😐','يحتاج تحسين 🔧'].map(o=>`
          <button class="choice-btn${sv.opinion===o?' active':''}" onclick="svPick('opinion','${o}',this)">${o}</button>
        `).join('')}
      </div>
      <button class="btn-next" onclick="svNext(4)">التالي ←</button>
      <button class="btn-prev" onclick="goStep(3)">← رجوع</button>
    `
  },
  {
    n:5, pill:'📣 التوصية', title:'تنصح أصحابك بصوب؟',
    render:()=>`
      <div class="choice-grid">
        ${['أي وأكيد 🙌','ممكن 🤔','ما أعرف 😅','لا 🙅'].map(o=>`
          <button class="choice-btn${sv.recommend===o?' active':''}" onclick="svPick('recommend','${o}',this)">${o}</button>
        `).join('')}
      </div>
      <button class="btn-next" onclick="svNext(5)">التالي ←</button>
      <button class="btn-prev" onclick="goStep(4)">← رجوع</button>
    `
  },
  {
    n:6, pill:'🌍 الدولة', title:'من أي دولة؟',
    render:()=>`
      <input type="text" class="survey-input" id="sv_country" placeholder="مثال: المملكة العربية السعودية" value="${sv.country||''}">
      <button class="btn-next" onclick="svNext(6)">التالي ←</button>
      <button class="btn-prev" onclick="goStep(5)">← رجوع</button>
    `
  },
  {
    n:7, pill:'🏙️ المدينة', title:'من أي مدينة؟',
    render:()=>`
      <input type="text" class="survey-input" id="sv_city" placeholder="مثال: الرياض" value="${sv.city||''}">
      <button class="btn-next" onclick="svNext(7)">التالي ←</button>
      <button class="btn-prev" onclick="goStep(6)">← رجوع</button>
    `
  },
  {
    n:8, pill:'🎯 الهوايات', title:'وش هواياتك؟',
    render:()=>`
      <div style="font-size:13px;color:#888;margin-bottom:16px">اختار أكثر من واحدة</div>
      <div class="pill-grid">
        ${['⚽ رياضة','🎨 فن','🎵 موسيقى','✈️ سفر','🍕 أكل','💻 تقنية','🎮 ألعاب','📚 قراءة'].map(h=>`
          <button class="pill-btn${sv.hobbies.includes(h)?' active':''}" onclick="svToggle('hobbies','${h}',this)">${h}</button>
        `).join('')}
      </div>
      <button class="btn-next" onclick="svNext(8)">التالي ←</button>
      <button class="btn-prev" onclick="goStep(7)">← رجوع</button>
    `
  },
  {
    n:9, pill:'🍽️ المطاعم', title:'اختار مطعمين تنصح فيهم',
    render:()=>`
      <div style="font-size:13px;color:#888;margin-bottom:16px">اختار اثنين بالضبط</div>
      <div class="rest-grid">
        ${['88 Portions','Primecut','Five Guys','الأسياخ','Wagyu','أخرى'].map(r=>`
          <button class="rest-btn${sv.restaurants.includes(r)?' active':''}" onclick="svToggleRest('${r}',this)">${r}</button>
        `).join('')}
      </div>
      <div class="err-msg" id="restErr">اختار مطعمين بالضبط</div>
      <button class="btn-next" onclick="svNext(9)" style="margin-top:16px">خلّصت ✓</button>
      <button class="btn-prev" onclick="goStep(8)">← رجوع</button>
    `
  }
];

function goStep(n){
  currentStep = n;
  const pct = Math.round((n/TOTAL)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = n+' / '+TOTAL;
  const s = STEPS[n-1];
  document.getElementById('stepContainer').innerHTML=`
    <div class="step-card">
      <div class="step-pill">${s.pill} • خطوة ${n} من ${TOTAL}</div>
      <h2 class="step-title">${s.title}</h2>
      ${s.render()}
    </div>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

function svPick(field, val, el){
  sv[field]=val;
  el.closest('.choice-grid').querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function svToggle(field, val, el){
  const idx=sv[field].indexOf(val);
  if(idx>=0){ sv[field].splice(idx,1); el.classList.remove('active'); }
  else { sv[field].push(val); el.classList.add('active'); }
}

function svToggleRest(val, el){
  const idx=sv.restaurants.indexOf(val);
  if(idx>=0){ sv.restaurants.splice(idx,1); el.classList.remove('active'); }
  else if(sv.restaurants.length<2){ sv.restaurants.push(val); el.classList.add('active'); }
}

function svNext(step){
  if(step===1){ sv.name = document.getElementById('sv_name')?.value||''; }
  if(step===6){ sv.country = document.getElementById('sv_country')?.value||''; }
  if(step===7){ sv.city = document.getElementById('sv_city')?.value||''; }
  if(step===9){
    if(sv.restaurants.length!==2){
      document.getElementById('restErr').style.display='block';
      return;
    }
    svDone(); return;
  }
  goStep(step+1);
}

function svDone(){
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressLabel').textContent='✓ تم';
  document.getElementById('stepContainer').innerHTML=`
    <div class="done-card">
      <div style="font-size:64px;margin-bottom:20px">🎉</div>
      <div style="font-size:28px;font-weight:900;margin-bottom:10px">شكراً ${sv.name||'لك'}!</div>
      <div style="font-size:15px;opacity:.75;line-height:1.8;margin-bottom:28px;max-width:380px;margin-inline:auto">
        رأيك يهمنا وراح يساعدنا نحسّن صوب أكثر 💜
      </div>
      <div style="margin-bottom:28px">
        <div style="font-size:12px;opacity:.6;margin-bottom:10px;font-weight:700;letter-spacing:.5px">المطاعم اللي اخترتها</div>
        ${sv.restaurants.map(r=>`<span class="done-rest">${r}</span>`).join('')}
      </div>
      <a href="soob-calculator.html" style="display:inline-block;background:var(--sunset);color:#fff;border:var(--border);box-shadow:var(--shadow);border-radius:999px;padding:16px 36px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;text-decoration:none;transition:transform .12s,box-shadow .12s" onmouseover="this.style.transform='translate(-2px,-2px)';this.style.boxShadow='7px 7px 0 #191919'" onmouseout="this.style.transform='';this.style.boxShadow='5px 5px 0 #191919'">
        ارجع للنتائج ←
      </a>
    </div>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

goStep(1);
</script>
</body>
</html>
